  <body>
    <header>
      <!-- Десктопная версия -->
      <div class="O_Header desktop">
        <nav>
          <a class="A_logoHeader" href="../index.html">
            <img src="../images/A_logoHeader.webp" alt="Логотип" />

          <div class="M_Navigation">
            <a class="A_navigationHeader" href="about.html">О нас</a>

          <!-- Десктопный поиск (скрытое поле, появляется по клику) -->

            <input
              type="text"
              class="A_header_search_input"
              placeholder="Найти"

              <div class="Q_iconSearch"></div>
            </div>
            <div class="W_search_results_dropdown"></div>
          </div>
        </nav>
      </div>

      <!-- Мобильная версия (бургер) -->
      <div class="O_Header mobile">
        <a class="A_logoHeader_mobile" href="../index.html">
          <img src="../images/A_logoHeader.webp" alt="Логотип" />
        </a>
        <div class="hamMenu">
          <div class="Q_menuIcon"></div>
          <div class="Q_menuIcon"></div>
          <div class="Q_menuIcon"></div>
        </div>
      </div>

      <!-- Оверлей мобильного меню -->

        <div class="overlay-header">
          <img src="../images/A_logoHeader.webp" alt="Логотип" />
          <div class="closeMenu">
            <span class="Q_closeButton">×</span>

        </div>
        <div class="M_menuItems">
          <a class="A_navigationHeader_mobile" href="about.html">О нас</a>

          <a class="A_navigationHeader_mobile" href="tests.html">Тесты</a>

        <div class="M_header_search_bar mobile-search always-open">
          <input
            type="text"
            class="A_header_search_input"
            placeholder="Найти"

          <div class="W_header_search_icon">
            <div class="Q_iconSearch"></div>
          </div>
          <div class="W_search_results_dropdown"></div>
        </div>
      </div>
    </header>
    <div class="W_Randomizer">
      <div class="M_mainTextRandomizer">
        <div class="A_Randomizer_title">
          <img
            src="../images/cards/Q_HeadingGrimoire.webp"
            alt="Гримуар"
            class="A_interactives_generator_logo"
          />
        </div>
        <h3 class="A_Randomizer_Text">
          Колода «Гримуар» хранит секреты <br />хоррор-вселенных. Открой карту —
          <br />и узнаешь один из них.
        </h3>
      </div>

      <div class="RandomizerCards">
        <div class="O_CardRandomizer card-bottom" data-card="bottom">
          <div class="Q_ImageRandomizer"></div>
        </div>

        <div class="O_CardRandomizer card-middle" data-card="middle">
          <div class="Q_ImageRandomizer"></div>
        </div>

        <div
          class="O_CardRandomizer card-top js-randomizer-trigger"
          data-card="top"
        >
          <div class="Q_ImageRandomizer"></div>
        </div>
      </div>
    </div>
