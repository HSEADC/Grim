        <div class="A_article_intoduction_text">
          <p class="A_p2">
            Обсуждение Джойс Байерс из сериала «Очень странные дела» после
            выхода пятого сезона набрало обороты в сети. Её стали критиковать,
            называя плохой матерью из-за эмоциональной нестабильности,
            чрезмерной нагрузки на Джонатана и невозможности обеспечить Уиллу
            безопасное детство. Но такое мнение часто основано не на глубоком
            анализе её персонажа, а на завышенных и нереалистичных ожиданиях от
            материнства, которые не учитывают социальные обстоятельства и
            психологические последствия пережитых травм.
          </p>
        </div>

        <div class="W_article_main_content_block">
          <div class="W_article_main_content_block_title">
            <h3>Survival parenting: воспитание в режиме выживания</h3>
          </div>
          <div class="W_article_main_content_block_text">
            <p>
              Джойс — мать-одиночка, представительница рабочего класса,
              постоянно сталкивающаяся с финансовыми трудностями.
              И это не просто декорации, а важный фактор, определяющий
              её поведение. Исследования показывают, что в таких сложных
              обстоятельствах воспитание детей часто сводится к так называемому
              <span class="highlight-red">survival parenting</span> — стратегии,
              ориентированной, в первую очередь, на обеспечение безопасности
              и выживания, а не на создание идеального эмоционального комфорта.
              Мать, действующая в таком режиме, может казаться суровой,
              тревожной или отстранённой, но это не говорит о её безразличии,
              а скорее является способом адаптации к постоянному стрессу.
            </p>
          </div>
        </div>

        <div class="W_article_main_content_block">
          <div class="W_article_main_content_block_title">
            <h3>
              Родительфикация Джонатана: выбор матери или сила обстоятельств?
            </h3>
          </div>
          <div class="W_article_main_content_block_text">
            <p>
              Одна из основных претензий к Джойс связана с её сыном Джонатаном.
              Зрители видят в нём слишком взрослого подростка и считают, что
              Джойс намеренно возложила на него роль второго родителя. В
              психологии это явление известно как <span class="highlight-red"
                >родительфикация</span
              >.
            </p>
            <p>
              Важно понимать, что родительфикация не всегда является результатом
              плохого воспитания. Она часто встречается в семьях, где
              отсутствует второй родитель, где есть материальные трудности и
              постоянная угроза безопасности.
            </p>
            <p>
              <span class="highlight-red">Принципиально важно:</span> в сериале
              не показано, что Джойс требует от Джонатана быть взрослым. Он сам
              берёт на себя эту роль, реагируя на сложившуюся ситуацию, а не
              выполняя материнский приказ. Это ключевое различие. В семье
              Байерсов родительфикация – это скорее структурная проблема,
              вызванная обстоятельствами, а не моральная ошибка матери.
            </p>
          </div>
        </div>

        <div class="W_article_main_content_block">
          <div class="W_article_main_content_block_title">
            <h3>Trauma-Informed Parenting: вера в Уилла против всего мира</h3>
          </div>
          <div class="W_article_main_content_block_text">
            <p>
              Критика в адрес Джойс особенно усиливается, когда речь заходит о
              Уилле. Зрителям кажется, что она игнорирует его боль или не знает,
              как с ней справиться. Но именно Джойс с самого начала проявляет
              то, что психологи называют <span class="highlight-red"
                >trauma-informed parenting</span
              > – подход, при котором опыт ребёнка признаётся реальным, даже
              если он кажется странным или пугающим. Она единственная, кто
              безоговорочно верит Уиллу, когда все вокруг считают её
              сумасшедшей. Она не обесценивает его переживания, не пытается
              вернуть его к нормальной жизни и не заставляет делать вид, что
              ничего не случилось.
            </p>
          </div>
        </div>

        <div class="W_article_main_content_block">
          <div class="W_article_main_content_block_title">
            <h3>Травма матери: гипербдительность вместо безразличия</h3>
          </div>
          <div class="W_article_main_content_block_text">
            <p>
              Исследования показывают, что родители, имеющие собственные
              неразрешённые травмы, часто испытывают трудности с управлением
              своими эмоциями, но при этом способны проявлять глубокое
              сочувствие.
            </p>
            <p>
              Джойс как раз такой персонаж. Её тревожность, резкость,
              эмоциональные срывы – это не признаки плохого материнства, а
              симптомы
              <span class="highlight-red">хронической гипербдительности</span>,
              характерной для людей, переживших постоянную угрозу потери
              близких.
            </p>
            <p>
              При этом сериал показывает, что Джойс не злоупотребляет своей
              властью над детьми. Она не пытается их контролировать, не
              навязывает им свои планы на жизнь и не заставляет соответствовать
              каким-то стандартам. В результате Джонатан и Уилл вырастают
              чуткими, внимательными и умеющими сопереживать – и это прямое
              следствие атмосферы в их семье, где чувства не подавляются, даже
              если не всегда получают идеальную поддержку.
            </p>
          </div>
        </div>

        <div class="W_article_main_content_block">
          <div class="W_article_main_content_block_title">
            <h3>
              Несправедливые критерии: судить с позиции безопасности, которой
              нет
            </h3>
          </div>
          <div class="W_article_main_content_block_text">
            <p>
              Проблема не в том, что Джойс Байерс – плохая мать. Проблема в том,
              что к ней применяют критерии, которые можно применить только в
              условиях стабильности, безопасности и поддержки – которых в её
              мире просто нет.
            </p>
            <p>
              Джойс – это не пример идеального родителя, а честный портрет
              матери, воспитывающей детей в условиях травмы и бедности, делающей
              выбор не между хорошо и плохо, а между выжить и потерять всё.
            </p>
            <p>

              страдает под давлением обстоятельств и пережитых моральных травм.
            </p>
